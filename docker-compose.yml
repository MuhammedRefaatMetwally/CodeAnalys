version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: devlens_postgres
    environment:
      POSTGRES_USER: devlens
      POSTGRES_PASSWORD: devlens123
      POSTGRES_DB: devlens
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: devlens_redis
    ports:
      - '6379:6379'

volumes:
  postgres_data: